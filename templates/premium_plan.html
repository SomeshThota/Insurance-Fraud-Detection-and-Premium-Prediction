<!DOCTYPE html>
<html>
<head>
    <title>Premium Plan Recommendation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Recommend Insurance Plan</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Age</label>
            <input type="number" name="Age" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Vehicle Price</label>
            <input type="number" name="VehiclePrice" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Vehicle Age</label>
            <input type="number" name="VehicleAge" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Past Claims</label>
            <input type="number" name="PastClaims" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Driving Experience (years)</label>
            <input type="number" name="DrivingExperience" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Recommend Plan</button>
    </form>
    <br>
    <a href="/" class="btn btn-secondary">Back to Home</a>
</body>
</html>
